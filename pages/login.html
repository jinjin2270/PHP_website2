<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Login | Future Blog</title>
  <link rel="stylesheet" href="../style.css" />
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700&family=Playfair+Display:wght@700&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css"/>
</head>
<body>
  <div class="auth-container">
    <!-- Left Side -->
    <div class="auth-left">
      <div class="auth-left-content">
        <div class="auth-logo">Future</div>
        <h2>Welcome Back</h2>
        <p>Sign in to read premium content, and connect with others.</p>
        <div class="auth-feature"><i class="fas fa-book-open"></i><span>Explore articles</span></div>
        <div class="auth-feature"><i class="fas fa-heart"></i><span>Like and save favorites</span></div>
        <div class="auth-feature"><i class="fas fa-comments"></i><span>Comment and join the community</span></div>
      </div>
    </div>

    <!-- Right Side -->
    <div class="auth-right">
      <div class="auth-form-container">
        <div class="auth-form-header">
          <h1>Sign In</h1>
          <p>Don’t have an account? <a href="register.html">Register now</a></p>
        </div>

        <form class="auth-form" id="loginForm" method="POST">
          <div class="form-group">
            <label for="email" class="form-label">Email Address</label>
            <input type="email" id="email" name="email" class="form-control" placeholder="Enter your email" required />
          </div>

          <div class="form-group">
            <label for="password" class="form-label">Password</label>
            <input type="password" id="password" name="password" class="form-control" placeholder="Enter your password" required />
            <i class="fas fa-eye password-toggle" id="togglePassword"></i>
          </div>

          <button type="submit" class="btn btn-primary">Login</button>

          <div class="divider">or login with</div>

          <div class="social-auth">
            <button type="button" class="social-btn"><i class="fab fa-google" style="color: #DB4437;"></i></button>
            <button type="button" class="social-btn"><i class="fab fa-facebook-f" style="color: #4267B2;"></i></button>
            <button type="button" class="social-btn"><i class="fab fa-twitter" style="color: #1DA1F2;"></i></button>
          </div>
        </form>
      </div>
    </div>
  </div>

  <script>
    const togglePassword = document.getElementById("togglePassword");
    const passwordField = document.getElementById("password");

    togglePassword.addEventListener("click", function () {
      const type = passwordField.getAttribute("type") === "password" ? "text" : "password";
      passwordField.setAttribute("type", type);
      this.classList.toggle("fa-eye-slash");
    });

    document.getElementById("loginForm").addEventListener("submit", function (e) {
      e.preventDefault();
      const formData = new FormData(this);

      fetch("../php/login.php", {
        method: "POST",
        body: formData
      })
        .then((res) => res.text())
        .then((data) => {
          if (data.trim() === "success") {
            alert("Login successful! ");
            window.location.href = "../index.php";
          } else {
            alert(data);
          }
        })
        .catch((error) => {
          console.error(error);
          alert("An error occurred. Please try again.");
        });
    });
  </script>
</body>
</html>
